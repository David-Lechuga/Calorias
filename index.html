<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Calórico</title>
    <!-- Icono Manzana -->
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/415/415733.png">
    
    <!-- Carga estable de librerías -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --highlight: #fbbf24; }
        body { font-family: sans-serif; padding: 15px; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        .title-main { font-size: 1.2rem; font-weight: 800; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }
        label { display: block; font-weight: 600; margin: 10px 0 5px; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #334155; border: 1px solid #475569; color: white; border-radius: 8px; text-align: center; font-size: 1rem; box-sizing: border-box; }
        .big-stat { font-size: 1.8rem; font-weight: 700; color: var(--highlight); margin: 15px 0; }
        .nav-btn { background: #334155; border: none; color: var(--accent); padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        button.action { padding: 12px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div class="title-main">CONTROL DE CALORIAS</div>
        <label>Calorías diarias objetivo</label>
        <input type="number" id="objetivoDiario" onchange="guardarConfig()">
    </div>

    <div class="card">
        <label>Fecha</label>
        <input type="date" id="fechaSeleccionada" onchange="cargarDatos()">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>Desayuno</label><input type="number" id="desayuno" oninput="calcular()"></div>
            <div><label>Almuerzo</label><input type="number" id="almuerzo" oninput="calcular()"></div>
            <div><label>Cena</label><input type="number" id="cena" oninput="calcular()"></div>
            <div><label>Otros</label><input type="number" id="otros" oninput="calcular()"></div>
        </div>
        <label>GYM</label>
        <input type="number" id="gym" oninput="calcular()">
        <div id="resultado" class="big-stat">0 kcal</div>
        <div id="detalle" style="font-weight: 600;"></div>
    </div>

    <div class="card">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <button class="nav-btn" onclick="cambiarSemana(-1)">◀</button>
            <h3 id="tituloGrafica" style="font-size: 0.8rem; margin: 0;">Semana</h3>
            <button class="nav-btn" onclick="cambiarSemana(1)">▶</button>
        </div>
        <canvas id="graficaSemanal" style="margin-top: 15px;"></canvas>
    </div>

    <div class="btn-group">
        <button class="action" onclick="exportarDatos()">Exportar</button>
        <button class="action" onclick="document.getElementById('fileInput').click()">Importar</button>
        <input type="file" id="fileInput" style="display:none" onchange="importarDatos(event)">
    </div>

    <script>
        // Registrar plugin manualmente
        Chart.register(ChartAnnotation);
        
        let db = JSON.parse(localStorage.getItem('calAppDB')) || { objetivo: 2000, registros: {} };
        let offsetSemana = 0;
        let chart;

        function guardarConfig() {
            db.objetivo = parseInt(document.getElementById('objetivoDiario').value) || 2000;
            localStorage.setItem('calAppDB', JSON.stringify(db));
            actualizarGrafica();
        }

        function calcular() {
            const d = parseFloat(document.getElementById('desayuno').value) || 0;
            const a = parseFloat(document.getElementById('almuerzo').value) || 0;
            const c = parseFloat(document.getElementById('cena').value) || 0;
            const o = parseFloat(document.getElementById('otros').value) || 0;
            const g = parseFloat(document.getElementById('gym').value) || 0;
            const neto = (d + a + c + o) - g;
            const restante = db.objetivo - neto;
            document.getElementById('resultado').innerText = `${neto} kcal`;
            document.getElementById('detalle').innerText = restante >= 0 ? `Restan: ${restante} kcal` : `Exceso: ${Math.abs(restante)} kcal`;
            
            const fecha = document.getElementById('fechaSeleccionada').value;
            if(fecha) {
                db.registros[fecha] = {d, a, c, o, g};
                localStorage.setItem('calAppDB', JSON.stringify(db));
                actualizarGrafica();
            }
        }

        function cambiarSemana(dir) { offsetSemana += dir; actualizarGrafica(); }

        function actualizarGrafica() {
            const hoy = new Date();
            const inicioSemana = new Date(hoy);
            inicioSemana.setDate(hoy.getDate() - (hoy.getDay() === 0 ? 6 : hoy.getDay() - 1) + (offsetSemana * 7));
            const finSemana = new Date(inicioSemana); finSemana.setDate(inicioSemana.getDate() + 6);
            
            const labels = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
            const data = [];
            for(let i=0; i<7; i++) {
                const d = new Date(inicioSemana); d.setDate(inicioSemana.getDate() + i);
                const r = db.registros[d.toISOString().split('T')[0]] || {d:0, a:0, c:0, o:0, g:0};
                data.push((r.d + r.a + r.c + r.o) - r.g);
            }

            document.getElementById('tituloGrafica').innerText = `${inicioSemana.toLocaleDateString()} al ${finSemana.toLocaleDateString()}`;
            
            const ctx = document.getElementById('graficaSemanal').getContext('2d');
            if(chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Kcal', data, backgroundColor: '#38bdf8' }] },
                options: {
                    plugins: { 
                        annotation: { 
                            annotations: { 
                                line1: { type: 'line', yMin: db.objetivo, yMax: db.objetivo, borderColor: '#fbbf24', borderWidth: 2 } 
                            } 
                        } 
                    },
                    scales: { y: { beginAtZero: true, grid: { color: '#334155' } } }
                }
            });
        }

        function exportarDatos() {
            const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "mis_calorias.json"; a.click();
        }

        function importarDatos(event) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                try {
                    db = JSON.parse(e.target.result); 
                    localStorage.setItem('calAppDB', JSON.stringify(db)); 
                    location.reload(); 
                } catch(err) { alert("Error al importar el archivo"); }
            };
            reader.readAsText(event.target.files[0]);
        }

        function cargarDatos() {
            const fecha = document.getElementById('fechaSeleccionada').value;
            const data = db.registros[fecha] || {d:0, a:0, c:0, o:0, g:0};
            document.getElementById('desayuno').value = data.d;
            document.getElementById('almuerzo').value = data.a;
            document.getElementById('cena').value = data.c;
            document.getElementById('otros').value = data.o;
            document.getElementById('gym').value = data.g;
            calcular();
        }

        document.getElementById('objetivoDiario').value = db.objetivo;
        document.getElementById('fechaSeleccionada').valueAsDate = new Date();
        cargarDatos();
        actualizarGrafica();
    </script>
</body>
</html>
